<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuxWords</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden; /* Без скролла */
        font-family: sans-serif;
    }

    body {
        display: flex;
        flex-direction: column;
        height: 100vh;
        box-sizing: border-box;
    }

    h2 {
        margin: 10px 0;
        text-align: center;
        flex: 0 0 auto;
    }

    #content {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 10px;
        box-sizing: border-box;
	max-width: 420px;
	margin: 0 auto;
	width: 100%;
    }

    #card {
        flex: 1 1 auto;
        border-radius: 20px;
        overflow: hidden;
        border: 2px solid #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
        max-height: 45vh;
    }

    #card img {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    #options {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .option {
        padding: 10px;
        margin: 6px 0;
        border-radius: 12px;
        background: #eee;
        cursor: pointer;
        font-size: clamp(16px, 4vw, 22px); /* Авто‑масштаб */
        transition: 0.2s;
        text-align: center;
    }

    .option.correct { background: #8fda8f; }
    .option.wrong { background: #f28b82; }

    #nextBtn {
        flex: 0 0 auto;
        margin: 10px auto;
        padding: 12px 20px;
        font-size: clamp(16px, 4vw, 22px);
        border-radius: 12px;
        border: none;
        background: #888;
        color: white;
        opacity: 0.5;
        width: 80%;
        max-width: 300px;
    }

    #nextBtn.active {
        background: #4caf50;
        opacity: 1;
        cursor: pointer;
    }
</style>
</head>

<body>

<h2>Очки: <span id="score">0</span></h2>

<div id="content">

    <div id="card"><img src=""></div>

    <div id="options"></div>

    <button id="nextBtn">Далее</button>

</div>

<script>
// --------------------------------------------------
// СПИСОК СЛОВ — ТЫ МЕНЯЕШЬ ТОЛЬКО ЭТО!
// --------------------------------------------------
const words = [
    "D'Brout",
    "D'Chipsen",
    "D'Mëllech",
    "De Räis",
    "Den Hunneg"
];

// --------------------------------------------------
// ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
// --------------------------------------------------
function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

function generateCards() {
    return words.map(word => {
        const wrong = shuffle(words.filter(w => w !== word)).slice(0, 3);
        return {
            img: "img/" + word + ".png",
            answer: word,
            options: shuffle([word, ...wrong])
        };
    });
}

let cards = shuffle(generateCards());
let index = 0;
let score = 0;

// --------------------------------------------------
// ОТРИСОВКА КАРТОЧКИ
// --------------------------------------------------
function loadCard() {
    const card = cards[index];
    document.querySelector("#card img").src = card.img;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    card.options.forEach(opt => {
        const div = document.createElement("div");
        div.className = "option";
        div.textContent = opt;
        div.onclick = () => checkAnswer(div, opt);
        optionsDiv.appendChild(div);
    });

    document.getElementById("nextBtn").classList.remove("active");
}

// --------------------------------------------------
// ПРОВЕРКА ОТВЕТА
// --------------------------------------------------
function checkAnswer(div, opt) {
    const correct = cards[index].answer;

    if (opt === correct) {
        div.classList.add("correct");
        score++;
        document.getElementById("score").textContent = score;
        document.getElementById("nextBtn").classList.add("active");
    } else {
        div.classList.add("wrong");
    }
}

// --------------------------------------------------
// КНОПКА "ДАЛЕЕ"
// --------------------------------------------------
document.getElementById("nextBtn").onclick = () => {
    if (!document.getElementById("nextBtn").classList.contains("active")) return;

    index++;
    if (index >= cards.length) {
        alert("Готово! Ваш результат: " + score);
        index = 0;
        score = 0;
        document.getElementById("score").textContent = score;
        cards = shuffle(generateCards());
    }
    loadCard();
};

// --------------------------------------------------
// СТАРТ
// --------------------------------------------------
loadCard();
</script>

</body>
</html>
